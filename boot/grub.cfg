# GRUB2 configuration for AIOS
# Multiboot2 compliant kernel

set default=0
set timeout=3
set gfxmode=1024x768x32
set gfxpayload=keep

insmod all_video
insmod gfxterm
terminal_output gfxterm

menuentry "AIOS - Autonomous Intelligent Operating System" {
    multiboot2 /boot/kernel.bin
    module2    /boot/initrd.img
    boot
}
