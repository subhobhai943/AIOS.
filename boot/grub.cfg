# GRUB2 configuration for AIOS
# Multiboot2 compliant kernel

set default=0
set timeout=3

# Load modules needed to read the ISO9660 filesystem and locate the kernel.
# Without these, GRUB may fail to find /boot/kernel.bin when the embedded
# module list is minimal (e.g. grub-mkrescue with --compress=none).
insmod iso9660
insmod part_msdos
insmod part_gpt
insmod all_video
insmod gfxterm
insmod multiboot2

set gfxmode=1024x768x32
set gfxpayload=keep
terminal_output gfxterm

menuentry "AIOS - Autonomous Intelligent Operating System" {
    multiboot2 /boot/kernel.bin
    module2    /boot/initrd.img
    boot
}
