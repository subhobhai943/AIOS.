# ─────────────────────────────────────────────────────────────────────────────
# AIOS — Automated Release
# Triggered when a version tag (v*.*.*) is pushed.
# Builds the ISO, creates a GitHub Release, and attaches the ISO as an asset.
#
# Usage:
#   git tag v0.2.0 -m "Phase 2: Core Kernel Systems"
#   git push origin v0.2.0
# ─────────────────────────────────────────────────────────────────────────────
name: 🚀 Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for changelog generation

      # ── 2. System dependencies ─────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            nasm qemu-system-x86 grub-pc-bin grub-common \
            xorriso mtools build-essential \
            libgmp-dev libmpfr-dev libmpc-dev wget

      # ── 3. Restore cross-compiler from cache ───────────────────────────────
      - name: Cache x86_64-elf cross-compiler
        id: cache-xcompiler
        uses: actions/cache@v4
        with:
          path: /opt/cross
          key: x86_64-elf-gcc-13-binutils-2.41

      - name: Build cross-compiler (cache miss)
        if: steps.cache-xcompiler.outputs.cache-hit != 'true'
        run: |
          export PREFIX="/opt/cross"
          export TARGET=x86_64-elf
          export PATH="$PREFIX/bin:$PATH"
          mkdir -p /tmp/xcompiler && cd /tmp/xcompiler
          wget -q https://ftp.gnu.org/gnu/binutils/binutils-2.41.tar.xz
          tar -xf binutils-2.41.tar.xz
          mkdir build-binutils && cd build-binutils
          ../binutils-2.41/configure --target=$TARGET --prefix=$PREFIX \
            --with-sysroot --disable-nls --disable-werror
          make -j$(nproc) && make install && cd /tmp/xcompiler
          wget -q https://ftp.gnu.org/gnu/gcc/gcc-13.2.0/gcc-13.2.0.tar.xz
          tar -xf gcc-13.2.0.tar.xz
          mkdir build-gcc && cd build-gcc
          ../gcc-13.2.0/configure --target=$TARGET --prefix=$PREFIX \
            --disable-nls --enable-languages=c --without-headers
          make -j$(nproc) all-gcc && make -j$(nproc) all-target-libgcc
          make install-gcc && make install-target-libgcc

      # ── 4. Build ISO ───────────────────────────────────────────────────────
      - name: Build AIOS ISO
        run: |
          export PATH="/opt/cross/bin:$PATH"
          make iso
          mv aios.iso aios-${{ github.ref_name }}.iso

      # ── 5. Generate changelog from git log ────────────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:'- %s (%h)' HEAD)
          else
            CHANGELOG=$(git log --pretty=format:'- %s (%h)' ${PREV_TAG}..HEAD)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── 6. Create GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "AIOS ${{ github.ref_name }}"
          body: |
            ## AIOS ${{ github.ref_name }}

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Download
            - `aios-${{ github.ref_name }}.iso` — bootable ISO image (GRUB2 + x86_64 kernel)

            ### Run in QEMU
            ```bash
            qemu-system-x86_64 -cdrom aios-${{ github.ref_name }}.iso -m 256M
            ```
          files: aios-${{ github.ref_name }}.iso
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
