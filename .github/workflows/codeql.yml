# ─────────────────────────────────────────────────────────────────────────────
# AIOS — CodeQL Static Analysis
# Scans C kernel source for security vulnerabilities and code quality issues.
# Runs on push to main, PRs, and weekly on Sunday.
# ─────────────────────────────────────────────────────────────────────────────
name: 🔍 CodeQL Analysis

on:
  push:
    branches: [ main ]
    paths:
      - 'kernel/**'
      - 'boot/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'kernel/**'
      - 'boot/**'
  schedule:
    - cron: '0 3 * * 0'   # Every Sunday at 03:00 UTC

jobs:
  analyze:
    name: Analyze C / Assembly
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'c-cpp' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            nasm gcc make

      # Build with the host compiler so CodeQL can trace the build.
      # We use the host gcc here (not the cross-compiler) purely for
      # static analysis — the output binary is not used.
      - name: Build for CodeQL tracing
        run: |
          make CROSS_COMPILE= CC=gcc AS=nasm || true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
