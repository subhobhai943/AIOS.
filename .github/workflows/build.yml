# ─────────────────────────────────────────────────────────────────────────────
# AIOS — Kernel Build CI
# Runs on every push and pull request.
# Sets up the x86_64-elf cross-compiler, builds the kernel, and uploads
# the resulting .iso as a build artifact.
# ─────────────────────────────────────────────────────────────────────────────
name: 🔨 Build Kernel

on:
  push:
    branches: [ main, dev, 'phase/*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Cross-Compile (x86_64-elf)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. System dependencies ─────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            nasm \
            qemu-system-x86 \
            grub-pc-bin \
            grub-common \
            xorriso \
            mtools \
            build-essential \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev \
            texinfo \
            wget \
            ca-certificates

      # ── 3. Cache cross-compiler ────────────────────────────────────────────
      - name: Cache x86_64-elf cross-compiler
        id: cache-xcompiler
        uses: actions/cache@v4
        with:
          path: /opt/cross
          key: x86_64-elf-gcc-13-binutils-2.41

      # ── 4. Build cross-compiler (only on cache miss) ───────────────────────
      - name: Build x86_64-elf cross-compiler
        if: steps.cache-xcompiler.outputs.cache-hit != 'true'
        run: |
          export PREFIX="/opt/cross"
          export TARGET=x86_64-elf
          export PATH="$PREFIX/bin:$PATH"
          mkdir -p /tmp/xcompiler && cd /tmp/xcompiler

          # Binutils
          wget -q https://ftp.gnu.org/gnu/binutils/binutils-2.41.tar.xz
          tar -xf binutils-2.41.tar.xz
          mkdir build-binutils && cd build-binutils
          ../binutils-2.41/configure \
            --target=$TARGET --prefix=$PREFIX \
            --with-sysroot --disable-nls --disable-werror
          make -j$(nproc)
          make install
          cd /tmp/xcompiler

          # GCC (C only, no libc)
          wget -q https://ftp.gnu.org/gnu/gcc/gcc-13.2.0/gcc-13.2.0.tar.xz
          tar -xf gcc-13.2.0.tar.xz
          mkdir build-gcc && cd build-gcc
          ../gcc-13.2.0/configure \
            --target=$TARGET --prefix=$PREFIX \
            --disable-nls --enable-languages=c \
            --without-headers
          make -j$(nproc) all-gcc
          make -j$(nproc) all-target-libgcc
          make install-gcc
          make install-target-libgcc

      # ── 5. Build AIOS ──────────────────────────────────────────────────────
      - name: Build AIOS kernel
        run: |
          export PATH="/opt/cross/bin:$PATH"
          make iso

      # ── 6. Upload ISO artifact ─────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: aios-${{ github.sha }}
          path: |
            *.iso
            *.img
          if-no-files-found: warn
          retention-days: 7
