# ─────────────────────────────────────────────────────────────────────────────
# AIOS — Roadmap Update Check
# Posts a warning comment on PRs that modify kernel or boot source files
# but do NOT update the ROADMAP. Reminds maintainers to keep the roadmap
# in sync with the code.
# ─────────────────────────────────────────────────────────────────────────────
name: 📋 Roadmap Sync Check

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

jobs:
  check:
    name: Check roadmap is updated
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for roadmap update
        id: roadmap
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          # Files changed in this PR
          CHANGED=$(git diff --name-only $BASE $HEAD)

          # Check if any kernel/boot source was touched
          SOURCE_CHANGED=$(echo "$CHANGED" | grep -E '^(kernel|boot)/' | wc -l)

          # Check if roadmap was also updated
          ROADMAP_CHANGED=$(echo "$CHANGED" | grep -iE '^ROADMAP\.md$' | wc -l)

          echo "source_changed=$SOURCE_CHANGED" >> $GITHUB_OUTPUT
          echo "roadmap_changed=$ROADMAP_CHANGED" >> $GITHUB_OUTPUT

      - name: Post warning if roadmap not updated
        if: steps.roadmap.outputs.source_changed > 0 && steps.roadmap.outputs.roadmap_changed == 0
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 📋 Roadmap Sync Reminder',
                '',
                'This PR modifies source files in `kernel/` or `boot/` but does **not** update the ROADMAP.',
                '',
                'If this PR completes or advances a roadmap task, please update:',
                '`ROADMAP.md`',
                '',
                'Mark completed items with ✅ and update the milestone summary table.',
                '',
                '_This is a reminder, not a blocker. You can ignore it if no roadmap tasks were affected._'
              ].join('\n')
            })

      - name: Roadmap is up to date
        if: steps.roadmap.outputs.roadmap_changed > 0
        run: echo "✅ Roadmap was updated in this PR."
